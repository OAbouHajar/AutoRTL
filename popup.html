<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --accent: #0d9488;
      --accent-light: #14b8a6;
      --accent-bg: rgba(13, 148, 136, 0.08);
      --bg: #0f1117;
      --bg-card: #1a1d27;
      --bg-input: #252836;
      --border: #2e3140;
      --text: #e8eaed;
      --text-dim: #8b8fa3;
      --text-muted: #5b5f73;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 100px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 20px 0;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(13, 148, 136, 0.5);
      transition: all 0.3s;
    }

    .status-dot.off {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
    }

    .status-label {
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle-track::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-track::before {
      transform: translateX(20px);
      background: #fff;
    }

    /* ── Cards ── */
    .card {
      margin: 12px 20px 0;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* ── Mode buttons ── */
    .mode-group {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      line-height: 1.3;
    }

    .mode-btn:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent-light);
    }

    .mode-btn .mode-icon {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 8px;
      margin: 12px 20px 0;
    }

    .stat {
      flex: 1;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-light);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 8px;
      margin-top: 12px;
    }

    .footer-version {
      font-size: 11px;
      color: var(--text-muted);
    }

    .footer-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .footer-link:hover {
      color: var(--accent-light);
    }

    /* ── Social / contribute bar ── */
    .social-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 20px 16px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .social-link:hover {
      color: var(--accent-light);
    }

    .social-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-dot { animation: pulse 2s ease-in-out infinite; }
    .status-dot.off { animation: none; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">ع</div>
    <div class="header-text">
      <h1>RTL Fixer</h1>
      <p>Auto-detect Arabic &amp; fix text direction</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-left">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">Active</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked />
      <span class="toggle-track"></span>
    </label>
  </div>

  <!-- Mode -->
  <div class="card">
    <div class="card-title">Direction Mode</div>
    <div class="mode-group">
      <button class="mode-btn active" data-mode="auto">
        <span class="mode-icon">🔄</span>Auto
      </button>
      <button class="mode-btn" data-mode="force-rtl">
        <span class="mode-icon">⬅️</span>Force RTL
      </button>
      <button class="mode-btn" data-mode="force-ltr">
        <span class="mode-icon">➡️</span>Force LTR
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="statFixed">—</div>
      <div class="stat-label">Fixed</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statInputs">—</div>
      <div class="stat-label">Inputs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statMode">Auto</div>
      <div class="stat-label">Mode</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-version">v1.0.0</span>
    <a class="footer-link" id="reloadLink">↻ Reload page</a>
  </div>

  <!-- Social / Contribute -->
  <div class="social-bar">
    <a class="social-link" href="https://github.com/OAbouHajar/AutoRTL" target="_blank" rel="noopener">

      Contribute
    </a>
    <a class="social-link" href="https://www.facebook.com/oabouhajar/" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16"><path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0 0 3.603 0 8.05 0 12.067 2.925 15.396 6.75 16v-5.624H4.719V8.049H6.75V6.276c0-2.017 1.195-3.132 3.022-3.132.877 0 1.795.157 1.795.157v1.98h-1.01c-.997 0-1.308.621-1.308 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/></svg>

  </div>

  <script src="popup.js"></script>
</body>
</html>
